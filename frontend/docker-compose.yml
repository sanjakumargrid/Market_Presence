version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════════
# Forge Careers Platform — Full Stack Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
#
# Services:
#   postgres    — PostgreSQL 16 primary database
#   redis       — Redis 7 cache layer
#   zookeeper   — Kafka coordination service
#   kafka       — Apache Kafka message broker
#   kafka-ui    — Kafka management UI (http://localhost:8090)
#   backend     — Spring Boot 3 REST API  (http://localhost:8080/api)
#   frontend    — React + Vite SPA        (http://localhost:3000)
#
# Usage:
#   docker compose up -d              # start everything
#   docker compose logs -f backend    # tail backend logs
#   docker compose down -v            # stop + remove volumes
# ═══════════════════════════════════════════════════════════════════════════════

x-common-env: &common-env
  TZ: UTC

networks:
  forge-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  uploads-data:

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_DB: forge_careers
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge123
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - forge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge_careers"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: forge-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - forge-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Zookeeper ────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: forge-zookeeper
    restart: unless-stopped
    environment:
      <<: *common-env
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_MAX_CLIENT_CNXNS: 60
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    networks:
      - forge-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Apache Kafka ─────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: forge-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      <<: *common-env
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG4J_LOGGERS: "kafka=WARN,kafka.controller=WARN,kafka.log.LogCleaner=WARN,state.change.logger=WARN,kafka.producer.async.DefaultEventHandler=WARN"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - forge-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka UI ─────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: forge-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      <<: *common-env
      KAFKA_CLUSTERS_0_NAME: forge-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - forge-net

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forge-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: forge_careers
      DB_USER: forge
      DB_PASSWORD: forge123
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Kafka
      KAFKA_BROKERS: kafka:29092
      # App
      SERVER_PORT: 8080
      JWT_SECRET: forge-careers-jwt-secret-key-production-2024-minimum-256-bits
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://frontend:80
      UPLOAD_DIR: /uploads/resumes
      EXTERNAL_JOBS_API: https://mock-api-pido.onrender.com/api/jobs
      # JVM
      JAVA_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - uploads-data:/uploads
    networks:
      - forge-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api
    container_name: forge-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - forge-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
